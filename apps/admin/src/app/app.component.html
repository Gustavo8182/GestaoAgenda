@if (isAuthRoute()) {
  <router-outlet />
} @else {
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navegação principal">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">A</span>
        <div>
          <strong>Agenda Platform</strong>
          <span>nome provisório</span>
        </div>
      </div>

      <nav>
        @for (item of navigation(); track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <span class="eyebrow">Ambiente inicial</span>
          <strong>{{ authService.currentOrganization()?.organizationName ?? 'Organização' }}</strong>
        </div>
        <div class="topbar__session">
          @if (authService.currentUser(); as user) {
            <span class="status">{{ user.displayName }}</span>
          }
          <button type="button" (click)="logout()">Sair</button>
        </div>
      </header>

      <router-outlet />
    </main>
  </div>
}
