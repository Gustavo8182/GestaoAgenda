<div class="login-shell">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="brand">
      <span class="brand__mark" aria-hidden="true">A</span>
      <div>
        <strong>Agenda Platform</strong>
        <span>nome provisório</span>
      </div>
    </div>

    <h1>Entrar</h1>

    <label for="email">E-mail</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      autocomplete="username"
      [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
    />
    @if (form.controls.email.invalid && form.controls.email.touched) {
      <span class="field-error">Informe um e-mail válido.</span>
    }

    <label for="password">Senha</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      autocomplete="current-password"
      [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched"
    />
    @if (form.controls.password.invalid && form.controls.password.touched) {
      <span class="field-error">Informe a senha.</span>
    }

    @if (errorMessage()) {
      <p class="form-error" role="alert">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Entrando…' : 'Entrar' }}
    </button>
  </form>
</div>
