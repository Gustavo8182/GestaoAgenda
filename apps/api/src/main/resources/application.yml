spring:
  application:
    name: agenda-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agenda}
    username: ${DB_USER:agenda}
    password: ${DB_PASSWORD:change-me}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  session:
    jdbc:
      initialize-schema: never
  jackson:
    time-zone: UTC

server:
  shutdown: graceful
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
