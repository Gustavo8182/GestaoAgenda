name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Verify backend
        run: ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24.18.0'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:ci
      - name: Production build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: agenda
          POSTGRES_USER: agenda
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agenda -d agenda"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build API jar
        working-directory: apps/api
        run: ./mvnw -B -DskipTests package
      - name: Start API (local profile, with dev seed)
        working-directory: apps/api
        env:
          POSTGRES_DB: agenda
          POSTGRES_USER: agenda
          POSTGRES_PASSWORD: change-me
          POSTGRES_PORT: 5432
        run: |
          nohup java -jar target/agenda-api-*.jar --spring.profiles.active=local > api.log 2>&1 &
          disown
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/actuator/health && exit 0
            sleep 2
          done
          echo "API did not become healthy in time" && cat api.log && exit 1
      - uses: actions/setup-node@v5
        with:
          node-version: '24.18.0'
      - name: Install frontend dependencies
        working-directory: apps/admin
        run: npm ci
      - name: Install Playwright browsers
        working-directory: apps/admin
        run: npx playwright install --with-deps chromium
      - name: Start frontend dev server
        working-directory: apps/admin
        run: |
          nohup npm start > ng-serve.log 2>&1 &
          disown
          for i in $(seq 1 30); do
            curl -sf http://localhost:4200 && exit 0
            sleep 2
          done
          echo "Frontend dev server did not become ready in time" && cat ng-serve.log && exit 1
      - name: Run E2E tests
        working-directory: apps/admin
        run: npm run test:e2e
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs
          path: |
            apps/api/api.log
            apps/admin/ng-serve.log
            apps/admin/test-results
