spring:
  application:
    name: agenda-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agenda}
    username: ${DB_USER:agenda}
    password: ${DB_PASSWORD:change-me}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  session:
    jdbc:
      initialize-schema: never
  jackson:
    time-zone: UTC
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  password-reset:
    token-validity-minutes: ${PASSWORD_RESET_TOKEN_VALIDITY_MINUTES:60}

server:
  shutdown: graceful
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:true}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
