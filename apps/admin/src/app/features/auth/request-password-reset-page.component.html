<div class="login-shell">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="brand">
      <span class="brand__mark" aria-hidden="true">A</span>
      <div>
        <strong>Agenda Platform</strong>
        <span>nome provisório</span>
      </div>
    </div>

    <h1>Esqueci minha senha</h1>

    @if (resultMessage()) {
      <p class="result-message" role="status">{{ resultMessage() }}</p>
    } @else {
      <label for="email">E-mail</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="username"
        [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <span class="field-error">Informe um e-mail válido.</span>
      }

      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Enviando…' : 'Enviar instruções' }}
      </button>
    }

    <a routerLink="/login" class="back-link">Voltar para o login</a>
  </form>
</div>
